<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Explorar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Explorar</ion-title>
    </ion-toolbar>
    <ion-toolbar>
      <ion-searchbar placeholder="Buscar señales..."></ion-searchbar>
    </ion-toolbar>
  </ion-header>

  <div class="explore-content">
    <div class="tags-section">
      <h3>Tags populares</h3>
      <div class="tags-container">
        <ion-chip>Arte</ion-chip>
        <ion-chip>Música</ion-chip>
        <ion-chip>Comida</ion-chip>
        <ion-chip>Deporte</ion-chip>
        <ion-chip>Cultura</ion-chip>
      </div>
    </div>

    <div class="signals-list">
      <p class="empty-text">No hay señales para mostrar</p>
    </div>
  </div>
</ion-content>
