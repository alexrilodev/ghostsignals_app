<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Perfil</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="profile-content">
    <div class="avatar-section">
      <div class="avatar">
        <ion-icon name="person-outline"></ion-icon>
      </div>
      <h2>Usuario</h2>
      <p>usuario@email.com</p>
    </div>

    <ion-list>
      <ion-list-header>
        <ion-label>Tags de interés</ion-label>
      </ion-list-header>
      <ion-item>
        <ion-label>Arte</ion-label>
        <ion-toggle slot="end"></ion-toggle>
      </ion-item>
      <ion-item>
        <ion-label>Música</ion-label>
        <ion-toggle slot="end"></ion-toggle>
      </ion-item>
      <ion-item>
        <ion-label>Comida</ion-label>
        <ion-toggle slot="end"></ion-toggle>
      </ion-item>
      <ion-item>
        <ion-label>Deporte</ion-label>
        <ion-toggle slot="end"></ion-toggle>
      </ion-item>
      <ion-item>
        <ion-label>Cultura</ion-label>
        <ion-toggle slot="end"></ion-toggle>
      </ion-item>
    </ion-list>

    <div class="logout-section">
      <ion-button expand="block" color="danger" (click)="logout()">
        Cerrar Sesión
      </ion-button>
    </div>
  </div>
</ion-content>
