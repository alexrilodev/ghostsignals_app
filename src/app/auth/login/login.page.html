<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="auth-container">
    <div class="auth-header">
      <div class="ghost-icon">
        <svg viewBox="0 0 512 512" width="64" height="64" fill="currentColor">
          <path d="M256 16C141.1 16 48 109.1 48 224v208c0 17.7 14.3 32 32 32c12.3 0 23.9-7.1 29.4-18.4L122.7 416h266.6l13.3 27.6c5.5 11.3 17.1 18.4 29.4 18.4c17.7 0 32-14.3 32-32V224C464 109.1 370.9 16 256 16zM176 288c-26.5 0-48-21.5-48-48s21.5-48 48-48s48 21.5 48 48S202.5 288 176 288zm160 0c-26.5 0-48-21.5-48-48s21.5-48 48-48s48 21.5 48 48S362.5 288 336 288z"/>
        </svg>
      </div>
      <h1>Ghost Signals</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <div class="social-buttons">
      <ion-button
        expand="block"
        fill="outline"
        (click)="loginWithGoogle()"
        [disabled]="loadingGoogle || loadingApple"
        class="google-button"
      >
        @if (loadingGoogle) {
          <ion-spinner name="crescent" slot="start"></ion-spinner>
        }
        Continuar con Google
      </ion-button>

      <ion-button
        expand="block"
        fill="outline"
        (click)="loginWithApple()"
        [disabled]="loadingGoogle || loadingApple"
        class="apple-button"
      >
        @if (loadingApple) {
          <ion-spinner name="crescent" slot="start"></ion-spinner>
        }
        Continuar con Apple
      </ion-button>
    </div>

    <div class="divider">
      <span>o continua con email</span>
    </div>

    <form (ngSubmit)="login()" class="auth-form">
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        ></ion-input>
      </ion-item>

      @if (error) {
        <ion-text color="danger" class="error-text">
          <p>{{ error }}</p>
        </ion-text>
      }

      <ion-button
        type="submit"
        expand="block"
        [disabled]="loading"
        class="auth-button"
      >
        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Iniciar Sesión
        }
      </ion-button>
    </form>

    <div class="auth-footer">
      <ion-button fill="clear" routerLink="/registro">
        ¿No tienes cuenta? Regístrate
      </ion-button>
    </div>
  </div>
</ion-content>
