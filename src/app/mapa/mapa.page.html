<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Mapa</ion-title>
    @if (loadingSignals) {
      <ion-spinner name="crescent" slot="end"></ion-spinner>
    }
    <ion-button fill="clear" slot="end" (click)="toggleTagFilter()">
      <ion-icon name="options-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<div class="map-page">
  @if (showTagFilter) {
    <div class="tags-bar">
      @for (tag of availableTags; track tag) {
        <ion-chip
          [outline]="!isTagSelected(tag)"
          (click)="toggleTag(tag)"
          [class.selected]="isTagSelected(tag)"
        >
          {{ tag }}
        </ion-chip>
      }
    </div>
  }

  <div id="map" class="map"></div>

  @if (loading) {
    <div class="overlay">
      <div class="empty-state">
        <ion-spinner name="crescent"></ion-spinner>
        <p>Obteniendo ubicación...</p>
      </div>
    </div>
  } @else if (errorPermission) {
    <div class="overlay">
      <div class="empty-state">
        <ion-icon name="location-outline" class="empty-icon"></ion-icon>
        <h2>Permiso de ubicación requerido</h2>
        <p>Para ver las señales cercanas necesitamos acceso a tu ubicación</p>
        <ion-button (click)="openSettings()">Abrir Ajustes</ion-button>
      </div>
    </div>
  }

  <ion-fab vertical="bottom" horizontal="center" slot="fixed" style="--offset-bottom: 72px;">
    <ion-fab-button routerLink="/tabs/crear-signal">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-button class="recenter-btn" fill="solid" (click)="recenterOnUser()" [disabled]="loading">
    <ion-icon name="locate" slot="icon-only"></ion-icon>
  </ion-button>
</div>
